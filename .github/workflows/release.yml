name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            command: npm run tauri -- build --target x86_64-pc-windows-msvc --bundles nsis
            rustTarget: x86_64-pc-windows-msvc
          - name: windows-arm64
            os: windows-11-arm
            command: npm run tauri -- build --target aarch64-pc-windows-msvc --bundles nsis
            rustTarget: aarch64-pc-windows-msvc
          - name: macos-x64
            os: macos-13
            command: npm run tauri -- build --target x86_64-apple-darwin --bundles dmg,app
            rustTarget: x86_64-apple-darwin
          - name: macos-arm64
            os: macos-14
            command: npm run tauri -- build --target aarch64-apple-darwin --bundles dmg,app
            rustTarget: aarch64-apple-darwin
          - name: linux-x64
            os: ubuntu-22.04
            command: npm run tauri -- build --target x86_64-unknown-linux-gnu --bundles appimage,deb
            rustTarget: x86_64-unknown-linux-gnu
          - name: linux-arm64
            os: ubuntu-22.04-arm
            command: npm run tauri -- build --target aarch64-unknown-linux-gnu --bundles appimage,deb
            rustTarget: aarch64-unknown-linux-gnu

    steps:
      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - name: Install dependencies
        run: npm ci

      - name: Check macOS signing readiness
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          missing=0
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID KEYCHAIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::notice::macOS signing secret $name is not configured."
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "::notice::Skipping public macOS artifact because unsigned downloads are blocked by Gatekeeper."
            echo "MACOS_SIGNING_READY=false" >> "$GITHUB_ENV"
          else
            echo "MACOS_SIGNING_READY=true" >> "$GITHUB_ENV"
          fi

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && env.MACOS_SIGNING_READY == 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -n 1 || true)
          if [ -z "$CERT_INFO" ]; then
            echo "::error::No Developer ID Application signing identity found in the imported certificate."
            exit 1
          fi
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Build native package
        if: runner.os != 'macOS' || env.MACOS_SIGNING_READY == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ${{ matrix.command }}

      - name: Upload workflow artifact
        if: runner.os != 'macOS' || env.MACOS_SIGNING_READY == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: claude-code-studio-next-${{ matrix.name }}
          path: |
            src-tauri/target/**/bundle/**/*.exe
            src-tauri/target/**/bundle/**/*.msi
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/**/bundle/**/*.AppImage
            src-tauri/target/**/bundle/**/*.deb
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: runner.os != 'macOS' || env.MACOS_SIGNING_READY == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          overwrite_files: true
          files: |
            src-tauri/target/**/bundle/**/*.exe
            src-tauri/target/**/bundle/**/*.msi
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/**/bundle/**/*.AppImage
            src-tauri/target/**/bundle/**/*.deb
