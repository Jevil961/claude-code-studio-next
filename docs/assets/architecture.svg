<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code Studio Next architecture</title>
  <desc id="desc">Architecture diagram showing the Tauri shell, modular frontend, local Node backend, local database, providers, MCP services, Skills, Teams workflows, and Claude Code runners.</desc>
  <defs>
    <style>
      .bg{fill:#0f172a}
      .card{fill:#111827;stroke:#334155;stroke-width:1.2}
      .inner{fill:#172033;stroke:#3a4a63;stroke-width:1}
      .title{font:800 32px Segoe UI,Inter,Arial,sans-serif;fill:#f8fafc}
      .sub{font:500 16px Segoe UI,Inter,Arial,sans-serif;fill:#9fb0c7}
      .label{font:750 18px Segoe UI,Inter,Arial,sans-serif;fill:#eef2ff}
      .text{font:500 14px Segoe UI,Inter,Arial,sans-serif;fill:#b7c3d7}
      .small{font:700 12px Segoe UI,Inter,Arial,sans-serif;fill:#7f8da3}
      .line{stroke:#607089;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#607089"/>
    </marker>
  </defs>
  <rect width="1200" height="560" rx="28" class="bg"/>
  <text x="54" y="64" class="title">Runtime architecture</text>
  <text x="54" y="96" class="sub">Native shell, modular UI, local backend, local data, and short-lived Claude Code runners.</text>

  <rect x="54" y="142" width="220" height="270" rx="18" class="card"/>
  <text x="84" y="184" class="label">Tauri shell</text>
  <text x="84" y="226" class="text">Native windows</text>
  <text x="84" y="256" class="text">File dialogs</text>
  <text x="84" y="286" class="text">Process lifecycle</text>
  <text x="84" y="316" class="text">Packaged runtime</text>

  <rect x="354" y="118" width="260" height="318" rx="18" class="card"/>
  <text x="386" y="158" class="label">Frontend modules</text>
  <rect x="386" y="188" width="184" height="34" rx="9" class="inner"/>
  <text x="406" y="211" class="text">Chat workspace</text>
  <rect x="386" y="238" width="184" height="34" rx="9" class="inner"/>
  <text x="406" y="261" class="text">Teams builder</text>
  <rect x="386" y="288" width="184" height="34" rx="9" class="inner"/>
  <text x="406" y="311" class="text">Settings surfaces</text>
  <rect x="386" y="338" width="184" height="34" rx="9" class="inner"/>
  <text x="406" y="361" class="text">Task center</text>

  <rect x="704" y="118" width="270" height="318" rx="18" class="card"/>
  <text x="736" y="158" class="label">Local Node backend</text>
  <text x="736" y="204" class="text">Provider/model routing</text>
  <text x="736" y="234" class="text">Skills and identity sync</text>
  <text x="736" y="264" class="text">MCP service management</text>
  <text x="736" y="294" class="text">Teams orchestration</text>
  <text x="736" y="324" class="text">Diagnostics and backups</text>
  <text x="736" y="354" class="text">Claude runner lifecycle</text>

  <rect x="1010" y="128" width="136" height="110" rx="16" class="card"/>
  <text x="1030" y="168" class="label">Data</text>
  <text x="1030" y="200" class="text">SQL.js</text>
  <text x="1030" y="224" class="text">Backups</text>

  <rect x="1010" y="276" width="136" height="128" rx="16" class="card"/>
  <text x="1030" y="316" class="label">Runners</text>
  <text x="1030" y="348" class="text">Claude Code</text>
  <text x="1030" y="372" class="text">MCP tools</text>
  <text x="1030" y="396" class="text">Providers</text>

  <path d="M274 277 C318 277 326 277 354 277" class="line"/>
  <path d="M614 277 C658 277 666 277 704 277" class="line"/>
  <path d="M974 220 C994 204 998 196 1010 190" class="line"/>
  <path d="M974 338 C994 348 998 354 1010 360" class="line"/>
  <text x="54" y="500" class="small">Privacy model: keep configuration, project cache, diagnostics, and workflow state local unless the user explicitly exports or pushes data.</text>
</svg>
