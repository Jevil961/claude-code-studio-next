<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">Installation and first-run flow</title>
  <desc id="desc">A clean installation flow from release download to first-run wizard and task execution.</desc>
  <defs>
    <style>
      .bg{fill:#f7fafc}
      .card{fill:#ffffff;stroke:#d8e0ea;stroke-width:1.2}
      .title{font:800 31px Segoe UI,Inter,Arial,sans-serif;fill:#101828}
      .sub{font:500 16px Segoe UI,Inter,Arial,sans-serif;fill:#526172}
      .step{font:800 18px Segoe UI,Inter,Arial,sans-serif;fill:#101828}
      .text{font:500 14px Segoe UI,Inter,Arial,sans-serif;fill:#526172}
      .pill{fill:#111827}
      .pillText{font:800 12px Segoe UI,Inter,Arial,sans-serif;fill:#ffffff}
      .line{stroke:#9aa8b8;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9aa8b8"/>
    </marker>
  </defs>
  <rect width="1200" height="380" rx="26" class="bg"/>
  <text x="52" y="64" class="title">Install, configure, then run</text>
  <text x="52" y="96" class="sub">Release packages stay in GitHub Releases; first-run guidance keeps setup clear for new users.</text>

  <rect x="58" y="150" width="215" height="144" rx="16" class="card"/>
  <rect x="84" y="176" width="76" height="28" rx="14" class="pill"/>
  <text x="106" y="195" class="pillText">STEP 1</text>
  <text x="84" y="236" class="step">Download</text>
  <text x="84" y="262" class="text">Choose installer or portable</text>

  <rect x="342" y="150" width="215" height="144" rx="16" class="card"/>
  <rect x="368" y="176" width="76" height="28" rx="14" class="pill"/>
  <text x="390" y="195" class="pillText">STEP 2</text>
  <text x="368" y="236" class="step">Launch app</text>
  <text x="368" y="262" class="text">Tauri shell starts backend</text>

  <rect x="626" y="150" width="215" height="144" rx="16" class="card"/>
  <rect x="652" y="176" width="76" height="28" rx="14" class="pill"/>
  <text x="674" y="195" class="pillText">STEP 3</text>
  <text x="652" y="236" class="step">First-run wizard</text>
  <text x="652" y="262" class="text">Provider, project, identity</text>

  <rect x="910" y="150" width="215" height="144" rx="16" class="card"/>
  <rect x="936" y="176" width="76" height="28" rx="14" class="pill"/>
  <text x="958" y="195" class="pillText">STEP 4</text>
  <text x="936" y="236" class="step">Run work</text>
  <text x="936" y="262" class="text">Chat directly or use Teams</text>

  <path d="M273 222 H342" class="line"/>
  <path d="M557 222 H626" class="line"/>
  <path d="M841 222 H910" class="line"/>
</svg>
