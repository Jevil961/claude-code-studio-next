<!doctype html>
<html lang="zh-CN" class="tdesign-dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Claude Code Studio Next</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <a href="#main" class="skip-link">跳转到主要内容</a>
    <div class="toast-box" id="toastBox" role="alert" aria-live="polite"></div>

    <div class="version-banner is-hidden" id="setupBanner">
      <div class="version-banner-body">
        <span class="version-banner-icon" id="setupBannerIcon">CC</span>
        <div style="flex:1;">
          <b id="setupBannerTitle">未检测到 Claude Code</b>
          <span id="setupBannerMsg">正在获取可用版本...</span>
        </div>
      </div>
      <div class="version-banner-actions" id="setupBannerActions">
        <select id="setupNodeVersionSelect" style="display:none;padding:4px 8px;border-radius:4px;background:var(--td-bg-color-container);color:var(--td-text-color-primary);border:1px solid var(--td-border-level-1-color);font-size:12px;"></select>
        <select id="setupVersionSelect" style="padding:4px 8px;border-radius:4px;background:var(--td-bg-color-container);color:var(--td-text-color-primary);border:1px solid var(--td-border-level-1-color);font-size:12px;"></select>
        <button class="st-btn t-btn--primary t-btn--sm" id="setupBannerInstall">一键安装</button>
        <button class="st-btn t-btn--link t-btn--sm" id="setupBannerDismiss">不再提示</button>
      </div>
    </div>

    <header class="topbar" role="banner">
      <button class="topbar-btn" id="sidebarToggle" type="button" title="侧边栏" data-tip="切换侧边栏" aria-label="切换侧边栏">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 2v12" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button class="topbar-btn" id="contextToggle" type="button" title="右侧面板" data-tip="切换右侧面板" aria-label="切换右侧面板">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M10 2v12" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button class="topbar-brand" id="brandMenuBtn" type="button" title="主菜单" data-tip="主菜单" aria-haspopup="true" aria-expanded="false">
        <svg class="logo-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="2.5" y="3" width="15" height="14" rx="3.2" stroke="currentColor" stroke-width="1.45"/>
          <path d="M6.4 8.2 4.8 10l1.6 1.8M13.6 8.2l1.6 1.8-1.6 1.8M11.2 6.8 8.8 13.2" stroke="currentColor" stroke-width="1.45" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="logo-text">Claude Code Studio Next</span>
        <svg class="brand-chevron" width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="float-dropdown" id="brandDropdown" style="min-width:176px;" role="menu" aria-label="主菜单">
        <button class="model-option" data-tab="providers" type="button" role="menuitem">Provider 管理</button>
        <button class="model-option" data-tab="identities" type="button" role="menuitem">身份与协作</button>
        <button class="model-option" data-tab="teams" type="button" role="menuitem">Teams 工作流</button>
        <button class="model-option" data-tab="tasks" type="button" role="menuitem">Agent Tasks</button>
        <div class="menu-separator"></div>
        <button class="model-option" data-tab="skills" type="button" role="menuitem">Skills 管理</button>
        <button class="model-option" data-tab="mcp" type="button" role="menuitem">MCP 服务</button>
        <button class="model-option" data-tab="plugins" type="button" role="menuitem">插件</button>
        <div class="menu-separator"></div>
        <button class="model-option" data-tab="usage" type="button" role="menuitem">用量统计</button>
        <button class="model-option" data-tab="diagnostics" type="button" role="menuitem">诊断</button>
        <button class="model-option" data-tab="general" type="button" role="menuitem">通用设置</button>
        <button class="model-option" id="helpBtn" type="button" role="menuitem">使用帮助</button>
      </div>
      <div class="topbar-actions">
        <button class="topbar-act" id="newChatBtn" type="button" title="新对话" data-tip="新对话 (Ctrl+N)" aria-label="新建对话">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2.5" y="2.5" width="11" height="9" rx="2.5" stroke="currentColor" stroke-width="1.3"/><path d="M6 10l-2 3h8l-2-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 4.5v3M6.5 6h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <span>新对话</span>
        </button>
        <button class="topbar-act" id="searchBtn" type="button" title="搜索" data-tip="搜索 (Ctrl+/)" aria-label="搜索">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <span>搜索</span>
        </button>
        <button class="topbar-act" id="pluginsBtn" type="button" title="插件">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 2h4v3a1 1 0 001 1h3v4h-3a1 1 0 00-1 1v3H6v-3a1 1 0 00-1-1H2V6h3a1 1 0 001-1V2z" stroke="currentColor" stroke-width="1.3"/></svg>
          <span>插件</span>
        </button>
        <button class="topbar-act topbar-act-primary" id="teamsBtn" type="button" title="Teams 工作流">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="5" cy="4" r="2" stroke="currentColor" stroke-width="1.3"/><circle cx="11" cy="4" r="2" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="11" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M5.8 5.8l2 4.4M10.2 5.8l-2 4.4" stroke="currentColor" stroke-width="1.3"/></svg>
          <span>Teams</span>
        </button>
      </div>
      <div class="window-actions">
        <button class="topbar-btn win-btn" id="winMinimize" type="button" title="最小化">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 8h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button class="topbar-btn win-btn" id="winMaximize" type="button" title="最大化">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="4.5" y="4.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
        <button class="topbar-btn win-btn win-btn-close" id="winClose" type="button" title="关闭">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M5 5l6 6M11 5l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>

    <div class="shell">
      <aside class="sidebar" id="sidebar" role="navigation" aria-label="项目和对话导航">
        <nav class="side-nav" aria-label="主要功能">
          <button class="side-nav-btn is-active" data-quick="chat" type="button">
            <span>CH</span>
            <b>工作区</b>
            <em>对话</em>
          </button>
          <button class="side-nav-btn" data-quick="teams" type="button">
            <span>TM</span>
            <b>Teams</b>
            <em>流程</em>
          </button>
          <button class="side-nav-btn" data-quick="tasks" type="button">
            <span>AG</span>
            <b>任务中心</b>
            <em>队列</em>
          </button>
          <button class="side-nav-btn" data-quick="providers" type="button">
            <span>AI</span>
            <b>模型配置</b>
            <em>连接</em>
          </button>
        </nav>
        <div class="sidebar-head">
          <span class="sidebar-title">项目</span>
          <div style="display:flex;gap:2px;">
            <button class="head-btn" id="addFolderBtn" type="button" title="添加目录">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
        <div class="conv-list" id="projectList" style="max-height:35%;"></div>
        <div class="sidebar-head" style="border-top:1px solid var(--td-border-level-2-color);">
          <span class="sidebar-title">对话</span>
          <button class="head-btn" id="newChatBtn2" type="button" title="新对话">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="conv-filter-bar" id="convFilterBar">
          <button class="conv-filter-btn is-active" data-filter="all" type="button">全部</button>
          <button class="conv-filter-btn" data-filter="pinned" type="button">置顶</button>
          <button class="conv-filter-btn" data-filter="recent" type="button">今天</button>
        </div>
        <div class="conv-list" id="convList" style="flex:1;"></div>
        <div class="sidebar-foot">
          <div class="foot-info" id="providerInfo">未连接</div>
          <div class="foot-info" id="identityInfo">--</div>
        </div>
      </aside>

      <main class="main" id="main" role="main">
        <section class="workspace-head" aria-label="当前工作区">
          <div class="workspace-title">
            <b>工作区</b>
            <span>选择项目后直接提交任务；复杂问题可交给 Teams 流程。</span>
          </div>
          <div class="workspace-pills">
            <span id="workspaceProviderPill">Provider</span>
            <span id="workspaceModePill">Auto</span>
          </div>
        </section>
        <div class="transcript" id="transcript" role="log" aria-live="polite" aria-label="对话内容"></div>
        <form class="composer-wrap" id="composer">
          <div class="plan-bar is-hidden" id="planBar">
            <span>计划已生成</span>
            <button id="approvePlanBtn" type="button">执行</button>
            <button id="revisePlanBtn" type="button">修改</button>
            <button id="cancelPlanBtn" type="button">取消</button>
          </div>
          <div class="composer">
            <div class="composer-top">
              <textarea id="promptInput" rows="1" placeholder="输入任务... (/ 触发快捷命令)" aria-label="输入任务"></textarea>
              <div class="attachment-tray" id="attachmentTray"></div>
            </div>
            <div class="composer-foot">
              <div class="cfoot-left">
                <div class="add-menu-wrap">
                  <button class="add-btn" id="addBtn" type="button" title="添加">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                  </button>
                  <div class="add-menu" id="addMenu">
                    <div class="add-menu-item" data-sub="identities">
                      <span class="ami-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.2"/><path d="M3 14c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="currentColor" stroke-width="1.2"/></svg></span>
                      <span class="ami-label">身份</span>
                      <span class="ami-arrow">›</span>
                      <div class="add-submenu" id="subIdentities"></div>
                    </div>
                    <div class="add-menu-item" data-sub="context">
                      <span class="ami-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 3h10v10H3z" stroke="currentColor" stroke-width="1.2"/><path d="M6 3v10M3 6h10" stroke="currentColor" stroke-width="1.2"/></svg></span>
                      <span class="ami-label">上下文</span>
                      <span class="ami-arrow">›</span>
                      <div class="add-submenu" id="subContext">
                        <button class="add-sub-item" data-action="addFolder" type="button">添加目录</button>
                        <button class="add-sub-item" data-action="addFile" type="button">添加文件</button>
                      </div>
                    </div>
                    <div class="add-menu-item" data-sub="tools">
                      <span class="ami-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 2l4 4-8 8H2v-4l8-8z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg></span>
                      <span class="ami-label">工具</span>
                      <span class="ami-arrow">›</span>
                      <div class="add-submenu" id="subTools">
                        <button class="add-sub-item" data-action="openSkills" type="button">Skills 管理</button>
                        <button class="add-sub-item" data-action="openMcp" type="button">MCP 服务</button>
                        <button class="add-sub-item" data-action="syncSkills" type="button">同步到 Claude</button>
                      </div>
                    </div>
                  </div>
                </div>
                <button class="cfoot-btn" id="permBtn" type="button">Auto ▾</button>
                <span class="mode-pill" id="modePill">Auto</span>
              </div>
              <div class="cfoot-right">
                <span class="cfoot-pill" id="runnerPill">未连接</span>
                <button class="model-btn" id="modelBtn" type="button">
                  <span id="modelLabel">未设置</span>
                  <svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <button class="run-stop-btn is-send" id="runStopBtn" type="submit" title="发送" aria-label="发送消息">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M3 7l5-5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
              </div>
            </div>
          </div>
        </form>
        <footer class="statusbar">
          <span id="cwdState">未选择项目</span>
          <span id="branchState"></span>
        </footer>
      </main>

      <aside class="context-stack" id="contextStack">
        <section class="ctx-section">
          <div class="ctx-head">
            <span>上下文</span>
            <button class="ctx-icon-btn" id="refreshIndexBtn" type="button" title="刷新项目索引">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M13 5a5 5 0 10.9 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M13 2v3h-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
          <div class="ctx-kv" id="contextOverview"></div>
        </section>
        <section class="ctx-section ctx-section-grow">
          <div class="ctx-head">
            <span>运行时间线</span>
            <span class="ctx-subtle" id="timelineCount">0</span>
          </div>
          <div class="run-timeline" id="runTimeline"></div>
        </section>
        <section class="ctx-section">
          <div class="ctx-head">
            <span>材料与变更</span>
            <span class="ctx-subtle" id="artifactCount">0</span>
          </div>
          <div class="artifact-list" id="artifactList"></div>
        </section>
      </aside>
    </div>

    <div class="float-dropdown" id="modelDropdown" style="min-width:180px;max-width:240px;"><div id="modelDropdownBody"></div></div>
    <div class="float-dropdown" id="permDropdown" style="min-width:150px;">
      <button class="perm-option is-active" data-mode="auto" type="button"><span class="perm-option-name">Auto</span><span class="perm-option-desc">低风险自动执行，高风险需要确认</span></button>
      <button class="perm-option" data-mode="plan" type="button"><span class="perm-option-name">Plan</span><span class="perm-option-desc">只生成计划，不执行改动</span></button>
      <button class="perm-option" data-mode="bypass" type="button"><span class="perm-option-name">Bypass</span><span class="perm-option-desc">跳过所有确认</span></button>
    </div>

    <div class="search-panel" id="searchPanel" role="search" aria-label="全局搜索">
      <div class="search-head">
        <input id="globalSearchInput" type="search" placeholder="搜索项目、对话、消息、插件、记忆关键词">
        <button class="topbar-btn" id="searchCloseBtn" type="button" title="关闭">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M5 5l6 6M11 5l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <div class="cmd-palette-overlay" id="cmdPaletteOverlay">
      <div class="cmd-palette">
        <input class="cmd-palette-input" id="cmdPaletteInput" type="text" placeholder="输入命令或搜索..." aria-label="命令面板">
        <div class="cmd-palette-results" id="cmdPaletteResults" role="listbox"></div>
      </div>
    </div>

    <div class="settings-page" id="settingsPage" role="dialog" aria-modal="true" aria-label="设置">
      <div class="settings-head">
        <button class="settings-back" id="settingsBack" type="button" aria-label="返回">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span class="settings-title" id="settingsTitle">设置</span>
      </div>
      <div class="settings-tabs" id="settingsTabs" role="tablist">
        <span class="stab-group">开始</span>
        <button class="stab is-active" data-tab="providers" type="button">Provider</button>
        <button class="stab" data-tab="identities" type="button">身份</button>
        <span class="stab-group">自动化</span>
        <button class="stab" data-tab="teams" type="button">Teams</button>
        <button class="stab" data-tab="tasks" type="button">Tasks</button>
        <span class="stab-group">工具</span>
        <button class="stab" data-tab="skills" type="button">Skills</button>
        <button class="stab" data-tab="mcp" type="button">MCP</button>
        <button class="stab" data-tab="plugins" type="button">插件</button>
        <span class="stab-group">运维</span>
        <button class="stab" data-tab="runners" type="button">Runner</button>
        <button class="stab" data-tab="usage" type="button">用量</button>
        <button class="stab" data-tab="diagnostics" type="button">诊断</button>
        <button class="stab" data-tab="general" type="button">通用</button>
      </div>
      <div class="settings-body" id="settingsBody"></div>
    </div>

    <div class="teams-page" id="teamsPage">
      <div class="teams-head">
        <button class="settings-back" id="teamsBack" type="button" aria-label="返回">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div>
          <div class="settings-title">Teams 工作流工作台</div>
          <div class="teams-subtitle">拖拽身份和组件，配置节点与连线条件，然后从右侧输入任务运行。</div>
        </div>
      </div>
      <div class="teams-body is-teams-builder" id="teamsBuilderBody"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-box" id="modalBox">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-fields" id="modalFields"></div>
        <div class="modal-foot">
          <button class="t-btn t-btn--default" id="modalCancel" type="button">取消</button>
          <button class="t-btn t-btn--primary" id="modalOk" type="button">确定</button>
        </div>
      </div>
    </div>

    <div class="float-dropdown" id="ctxMenu" style="min-width:120px;" role="menu" aria-label="上下文菜单"></div>

    <div class="wizard-overlay" id="wizardOverlay">
      <div class="wizard-box">
        <div class="wizard-head">
          <div>
            <div class="wizard-kicker" id="wizardKicker">首次设置</div>
            <div class="wizard-title" id="wizardTitle">欢迎使用 Claude Code Studio</div>
          </div>
          <button class="topbar-btn" id="wizardClose" type="button" title="关闭">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M5 5l6 6M11 5l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="wizard-steps" id="wizardSteps"></div>
        <div class="wizard-body" id="wizardBody"></div>
        <div class="wizard-foot">
          <button class="st-btn t-btn--link" id="wizardSkip" type="button">稍后再说</button>
          <div class="wizard-actions">
            <button class="st-btn t-btn--link" id="wizardPrev" type="button">上一步</button>
            <button class="st-btn t-btn--primary t-btn--sm" id="wizardNext" type="button">下一步</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="confirmOverlay" role="alertdialog" aria-modal="true" aria-labelledby="confirmTitle">
      <div class="modal-box">
        <div class="modal-title" id="confirmTitle"></div>
        <div class="modal-msg" id="confirmMsg"></div>
        <div class="modal-foot">
          <button class="t-btn t-btn--default" id="confirmCancel" type="button">取消</button>
          <button class="t-btn t-btn--primary" id="confirmOk" type="button">确定</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="askOverlay" role="dialog" aria-modal="true" aria-labelledby="askTitle">
      <div class="modal-box">
        <div class="modal-title" id="askTitle">需要确认</div>
        <div class="ask-questions" id="askQuestions"></div>
      </div>
    </div>

    <template id="tplConv">
      <button class="conv-item" type="button">
        <div class="conv-item-body">
          <div class="conv-item-title"></div>
          <div class="conv-item-time"></div>
        </div>
        <span class="conv-item-badge"></span>
      </button>
    </template>
